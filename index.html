<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
       <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
</head>

<body class="min-h-screen flex items-center justify-center font-sans">

    <div class="bg-white w-80 p-8 rounded-2xl shadow-2xl text-center">

        <h2 class="text-2xl font-bold text-gray-700 mb-6"> Random Number Generator </h2>

        <p id="output" class="text-4xl font-bold text-blue-600 mb-6"> </p>

        <button id="generateBtn"
            class="bg-blue-600 text-white px-6 py-3 rounded-xl w-full font-semibold hover:bg-blue-700">
            Generate Number
        </button>

    </div>

    <script src="random.js"></script>
</body>

</html>
